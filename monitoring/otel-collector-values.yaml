fullnameOverride: otel-collector

mode: deployment
replicaCount: 1

image:
  repository: otel/opentelemetry-collector-contrib

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

  processors:
    memory_limiter:
      check_interval: 1s
      limit_mib: 200
      spike_limit_mib: 50
    batch:
      timeout: 5s
      send_batch_size: 512

  exporters:
    debug: {}
    otlp/tempo:
      # gRPC endpoint — no http:// prefix, gRPC uses bare host:port
      endpoint: tempo.monitoring.svc:4317
      tls:
        insecure: true

  extensions:
    health_check:
      endpoint: 0.0.0.0:13133

  service:
    extensions: [health_check]
    pipelines:
      traces:
        receivers: [otlp]
        processors: [memory_limiter, batch]
        exporters: [debug, otlp/tempo]
      metrics:
        # prometheus receiver removed — kube-prometheus-stack already
        # scrapes the collector directly, no need to double-scrape
        receivers: [otlp]
        processors: [memory_limiter, batch]
        exporters: [debug]

ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP
  jaeger-compact:
    enabled: false
  jaeger-thrift:
    enabled: false
  jaeger-grpc:
    enabled: false
  zipkin:
    enabled: false