prometheus:
  enabled: true
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
   # enableRemoteWriteReceiver: true #for node graph in tempo

    retention: 7d

    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi

    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi

    additionalScrapeConfigs:
      - job_name: "order-app-services"
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - order-app
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_ip, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            target_label: __address__
            regex: (.+);(.+)
            replacement: $1:$2
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: service

alertmanager:
  enabled: true

  config:
    global:
      resolve_timeout: 5m

    route:
      receiver: default

      group_by:
        - alertname
        - application
        - severity

      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h

      routes:
        - matchers:
            - application="order-app"
          receiver: slack

    receivers:
      - name: default

      - name: slack
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/alertmanager-slack-secret/slack-webhook

            channel: "#order-app-alerts"

            send_resolved: true

            username: "Alertmanager"

            icon_emoji: ":rotating_light:"

            title: >-
              [{{ .Status | toUpper }}] {{ .CommonLabels.alertname }} ({{ .CommonLabels.severity }})

            text: |-
              *Application:* {{ .CommonLabels.application }}
              *Severity:* {{ .CommonLabels.severity }}
              *Service:* {{ .CommonLabels.service }}

              *Summary*
              {{ .CommonAnnotations.summary }}

              *Description*
              {{ .CommonAnnotations.description }}

              *Started*
              {{ (index .Alerts 0).StartsAt }}

  alertmanagerSpec:
    secrets:
      - alertmanager-slack-secret

    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

    storage:
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi

grafana:
  enabled: true
  deploymentStrategy:
    type: Recreate
  adminPassword: "observeall@123"   # move to a Secret before sharing this cluster with anyone
  service:
    type: ClusterIP   # no public exposure — reach it via port-forward from the bastion
  persistence:
    enabled: true
    size: 2Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

kubeStateMetrics:
  enabled: true

# GKE is a managed control plane — you have no access to scrape these
# components yourself, so disabling rather than leaving them as
# permanently-failing targets.
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeEtcd:
  enabled: false
kubeProxy:
  enabled: false
coreDns:
  enabled: false

defaultRules:
  rules:
    kubeProxy: false
    kubeScheduler: false
    kubeControllerManager: false
    etcd: false
    disabled:
      TargetDown: true
      InfoInhibitor: true

prometheus-node-exporter:
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 50m
      memory: 64Mi