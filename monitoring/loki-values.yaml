deploymentMode: SingleBinary

loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1

  storage:
    type: filesystem

    bucketNames:
      chunks: chunks
      ruler: ruler
      admin: admin

  storage_config:
    filesystem:
      directory: /var/loki/chunks

  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  limits_config:
    retention_period: 168h
    allow_structured_metadata: true

singleBinary:
  replicas: 1

  persistence:
    enabled: true
    storageClass: standard-rwo
    size: 5Gi

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

backend:
  replicas: 0

read:
  replicas: 0

write:
  replicas: 0

ingester:
  replicas: 0

querier:
  replicas: 0

queryFrontend:
  replicas: 0

queryScheduler:
  replicas: 0

distributor:
  replicas: 0

compactor:
  replicas: 0

indexGateway:
  replicas: 0

patternIngester:
  replicas: 0

bloomGateway:
  replicas: 0

bloomCompactor:
  replicas: 0

gateway:
  enabled: false

minio:
  enabled: false

chunksCache:
  enabled: false

resultsCache:
  enabled: false

lokiCanary:
  enabled: false

test:
  enabled: false

promtail:
  enabled: false

monitoring:
  dashboards:
    enabled: true
  serviceMonitor:
    enabled: true