replicaCount: 2

image:
  # Full registry path without tag, e.g.
  # REGION-docker.pkg.dev/PROJECT_ID/order-app/order-service
  repository: asia-south1-docker.pkg.dev/iconic-being-499605-m3/order-app/order-service
  tag: latest
  pullPolicy: always

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

namespace: order-app

serviceAccount:
  # Set to true if the pod needs a GCP/K8s identity (e.g. Workload
  # Identity to call other GCP services). Not required for this app
  # today.
  create: false
  annotations: {}
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8000"
  prometheus.io/path: "/metrics"

podLabels: {}

podSecurityContext:
  runAsNonRoot: true

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8000
  targetPort: 8000

containerPort: 8000

# Sized to cover idle (~90-130Mi baseline from FastAPI + structlog +
# prometheus_client + OTel SDK/instrumentation) plus real concurrency
# under the k6 load test, not just dev-level poking.
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

startupProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 2
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 12 

readinessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

livenessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 10
  periodSeconds: 15
  timeoutSeconds: 3
  failureThreshold: 3

# Plain (non-secret) env vars merged with the required OTEL_SERVICE_NAME
env:
  OTEL_SERVICE_NAME: order-service

# Names of upstream services this app talks to. Templated into env vars
# INVENTORY_SERVICE_URL / NOTIFICATION_SERVICE_URL so they aren't
# hardcoded in app code. NOTE: main.py currently hardcodes these URLs
# itself — these env vars are only useful once the app reads them via
# os.environ.get(...).
upstreamServices:
  inventory:
    host: inventory-service
    port: 8001
  notification:
    host: notification-service
    port: 8002

# Autoscaling on the custom metric order_active_requests (exposed by
# main.py, via Prometheus -> Prometheus Adapter -> custom.metrics.k8s.io).
# Requires the Prometheus Adapter rule for order_active_requests to be
# live and serving before this will actually scale.
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Pods
      pods:
        metric:
          name: order_active_requests
        target:
          type: AverageValue
          averageValue: "10"
